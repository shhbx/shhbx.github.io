<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name | Academic Homepage</title>
  <style>
    /* 全局重置与基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;
      color: #2c3e50;
      background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    /* 主容器 */
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 3rem 4rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: box-shadow 0.3s ease;
    }

    .container:hover {
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    /* 头部个人信息区 */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid #f0f4f8;
    }

    .header h1 {
      font-size: 3rem;
      color: #1a202c;
      margin-bottom: 0.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header .title {
      font-size: 1.3rem;
      color: #4a5568;
      margin-bottom: 1.2rem;
      font-weight: 400;
    }

    .header .contact {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
      font-size: 1.05rem;
    }

    .header .contact a {
      color: #1a73e8;
      text-decoration: none;
      transition: color 0.2s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header .contact a:hover {
      color: #0d47a1;
      transform: translateY(-2px);
    }

    /* 出版物区域 */
    .publications {
      margin-top: 2rem;
    }

    .publications h2 {
      font-size: 1.8rem;
      color: #1a202c;
      margin-bottom: 2rem;
      padding-bottom: 0.8rem;
      border-bottom: 3px solid #1a73e8;
      display: inline-block;
    }

    /* 论文卡片样式 */
    .paper-card {
      background: #f8f9fa;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 1.8rem;
      transition: all 0.3s ease;
    }

    .paper-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  border-color: #cbd5e0;
}

.paper-card .title {
  font-size: 1.35rem;
  font-weight: 600;
  color: #1a202c;
  margin-bottom: 0.8rem;
  line-height: 1.4;
}

.paper-card .authors {
  font-size: 1.05rem;
  color: #4a5568;
  margin-bottom: 0.6rem;
}

.paper-card .venue {
  font-size: 1rem;
  color: #718096;
  margin-bottom: 1.2rem;
  font-style: italic;
}

/* 论文链接按钮组 */
.paper-links {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.paper-links a {
  display: inline-block;
  padding: 0.6rem 1.4rem;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s ease;
  text-align: center;
}

/* 按钮样式区分 */
.paper-links .project {
  background: #1a73e8;
  color: #ffffff;
}

.paper-links .project:hover {
  background: #0d47a1;
}

.paper-links .paper {
  background: #34a853;
  color: #ffffff;
}

.paper-links .paper:hover {
  background: #1e8e3e;
}

.paper-links .code {
  background: #fbbc05;
  color: #202124;
}

.paper-links .code:hover {
  background: #f9ab00;
}

  </style>
</head>
<body>

  <div class="container">
    <!-- 头部个人信息 -->
    <div class="header">
      <h1>hhsun</h1>
      <p class="title">Master Student</p>
      <div class="contact">
        <a href="mailto:honghaosun@mail.ustc.edu.cn">✉️ honghaosun@mail.ustc.edu.cn</a>
        <a href="https://github.com/shhbx" target="_blank">💻 github.com/shhbx</a>
        <a href="#">📚 Google Scholar</a>
        <a href="#">🌐 Personal Website</a>
      </div>
    </div>

    <!-- 出版物列表 -->
    <div class="publications">
      <h2>Selected Publications</h2>

      <!-- 论文卡片 -->
      <div class="paper-card">
        <div class="title">title</div>
        <div class="authors">author</div>
        <div class="venue">none</div>
        <div class="paper-links">
          <a href="saepenet/" class="project">Project Page</a>
          <a href="#" class="paper">Paper PDF</a>
          <a href="#" class="code">GitHub Code</a>
        </div>
      </div>

      <!-- 可添加更多论文卡片 -->
      <!-- <div class="paper-card">
        <div class="title">Another Paper Title</div>
        <div class="authors">Your Name, Others</div>
        <div class="venue">Conference/Journal, 2025</div>
        <div class="paper-links">
          <a href="#" class="project">Project Page</a>
          <a href="#" class="paper">Paper PDF</a>
          <a href="#" class="code">GitHub Code</a>
        </div>
      </div> -->
    </div>
  </div>

</body>
</html>
